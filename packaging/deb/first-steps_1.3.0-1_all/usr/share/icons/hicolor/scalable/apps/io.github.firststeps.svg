<!-- First Steps application icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3584e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c71d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#57e389;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#33d17a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)" />

  <!-- Footstep / path icon representing "first steps" -->
  <!-- Step 1 (left foot) -->
  <ellipse cx="42" cy="44" rx="10" ry="14" fill="white" opacity="0.9" transform="rotate(-15, 42, 44)" />
  <ellipse cx="38" cy="28" rx="4" ry="5" fill="white" opacity="0.7" transform="rotate(-15, 38, 28)" />

  <!-- Step 2 (right foot) -->
  <ellipse cx="68" cy="58" rx="10" ry="14" fill="white" opacity="0.9" transform="rotate(10, 68, 58)" />
  <ellipse cx="73" cy="43" rx="4" ry="5" fill="white" opacity="0.7" transform="rotate(10, 73, 43)" />

  <!-- Step 3 (left foot, forward) -->
  <ellipse cx="52" cy="78" rx="10" ry="14" fill="url(#accent)" opacity="0.95" transform="rotate(-10, 52, 78)" />
  <ellipse cx="47" cy="63" rx="4" ry="5" fill="url(#accent)" opacity="0.8" transform="rotate(-10, 47, 63)" />

  <!-- Checkmark on the green step -->
  <path d="M 44 78 L 50 85 L 62 72" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Small sparkle / star -->
  <path d="M 90 30 L 92 24 L 94 30 L 100 32 L 94 34 L 92 40 L 90 34 L 84 32 Z" fill="white" opacity="0.6" />

  <!-- Bottom text area hint -->
  <text x="64" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" opacity="0.85">FIRST STEPS</text>
</svg>
